version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-browser-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ai_browser
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-browser-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../devops/docker/Dockerfile.backend
    container_name: ai-browser-backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/ai_browser
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_here
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - session_data:/app/sessions

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../devops/docker/Dockerfile.frontend
    container_name: ai-browser-frontend
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  session_data: