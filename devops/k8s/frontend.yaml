apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-browser-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-browser-frontend
  template:
    metadata:
      labels:
        app: ai-browser-frontend
    spec:
      containers:
        - name: frontend
          image: ai-browser-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '300m'
              memory: '256Mi'
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-browser-frontend
spec:
  selector:
    app: ai-browser-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP