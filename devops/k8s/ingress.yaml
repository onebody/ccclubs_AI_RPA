apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-browser-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'false'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
spec:
  rules:
    - host: ai-browser.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ai-browser-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-browser-frontend
                port:
                  number: 80