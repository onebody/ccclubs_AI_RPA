<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; img-src 'self' data: blob: https:; connect-src 'self' ws: http:;" />
  <title>AI 浏览器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      -webkit-app-region: drag;
    }
    .toolbar button {
      background: #0f3460;
      border: 1px solid #1a5276;
      color: #e0e0e0;
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }
    .toolbar button:hover {
      background: #1a5276;
      border-color: #2980b9;
    }
    .toolbar button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 地址栏 */
    .url-bar {
      display: flex;
      flex: 1;
      gap: 0;
      -webkit-app-region: no-drag;
    }
    .url-bar input {
      flex: 1;
      padding: 8px 14px;
      background: #0f3460;
      border: 1px solid #1a5276;
      border-radius: 20px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-bar input:focus {
      border-color: #2980b9;
    }
    .url-bar input::placeholder {
      color: #7f8c8d;
    }

    /* 状态栏 */
    .status-bar {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      background: #0f3460;
      font-size: 12px;
      color: #7f8c8d;
      gap: 16px;
    }
    .status-bar .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #27ae60;
      display: inline-block;
    }
    .status-bar .dot.connecting {
      background: #f39c12;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0.3; }
    }

    /* 内容区 */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      position: relative;
    }
    .content-area .page-view {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }
    .content-area .page-view img {
      max-width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      border-radius: 4px;
    }
    .content-area .loading {
      text-align: center;
      color: #7f8c8d;
    }
    .content-area .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #0f3460;
      border-top-color: #2980b9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 页面信息浮层 */
    .page-info {
      padding: 24px;
      background: #16213e;
      border-radius: 12px;
      border: 1px solid #0f3460;
      text-align: center;
      max-width: 600px;
    }
    .page-info h2 {
      color: #2980b9;
      margin-bottom: 12px;
      font-size: 18px;
    }
    .page-info .meta {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px 16px;
      text-align: left;
      font-size: 13px;
      color: #bdc3c7;
    }
    .page-info .meta dt {
      color: #7f8c8d;
    }
  </style>
</head>
<body>
  <!-- 工具栏 -->
  <div class="toolbar" id="toolbar">
    <button id="btn-back" title="后退" onclick="goBack()">&#x25C0;</button>
    <button id="btn-forward" title="前进" onclick="goForward()">&#x25B6;</button>
    <button id="btn-refresh" title="刷新" onclick="refresh()">&#x21BB;</button>
    <div class="url-bar">
      <input type="text" id="url-input" placeholder="输入网址..." value="https://zj.122.gov.cn/" onkeydown="if(event.key==='Enter') navigate()" />
    </div>
    <button id="btn-go" onclick="navigate()">前往</button>
    <button id="btn-screenshot" title="截图" onclick="takeScreenshot()">&#x1F4F7;</button>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar" id="status-bar">
    <span class="dot connecting" id="status-dot"></span>
    <span id="status-text">正在连接 Chrome...</span>
    <span id="page-title" style="margin-left:auto;"></span>
  </div>

  <!-- 内容区 -->
  <div class="content-area" id="content-area">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在启动浏览器引擎...</p>
    </div>
    <div class="page-view" id="page-view" style="display:none;">
      <img id="page-screenshot" alt="页面截图" />
    </div>
    <div class="page-info" id="page-info" style="display:none;"></div>
  </div>

  <script>
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      updateStatus('connecting', '正在连接 Chrome...');
      // 等待 Electron API 就绪后自动导航
      setTimeout(async () => {
        await navigate();
      }, 3000);
    });

    function updateStatus(state, text) {
      const dot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');
      dot.className = 'dot';
      if (state === 'connecting') dot.classList.add('connecting');
      statusText.textContent = text;
    }

    async function navigate() {
      const urlInput = document.getElementById('url-input');
      const url = urlInput.value.trim();
      if (!url) return;

      updateStatus('connecting', '加载中...');
      showLoading(true);

      try {
        const result = await window.electronAPI.navigate(url);
        displayPageInfo(result);
        updateStatus('connected', '已连接');

        // 自动截图
        await takeScreenshot();
      } catch (err) {
        updateStatus('connected', '加载失败: ' + err.message);
        showLoading(false);
      }
    }

    async function goBack() {
      try {
        const result = await window.electronAPI.goBack();
        document.getElementById('url-input').value = result.url;
        displayPageInfo(result);
        await takeScreenshot();
      } catch (err) {
        console.error('后退失败:', err);
      }
    }

    async function goForward() {
      try {
        const result = await window.electronAPI.goForward();
        document.getElementById('url-input').value = result.url;
        displayPageInfo(result);
        await takeScreenshot();
      } catch (err) {
        console.error('前进失败:', err);
      }
    }

    async function refresh() {
      await navigate();
    }

    async function takeScreenshot() {
      try {
        const result = await window.electronAPI.screenshot();
        const img = document.getElementById('page-screenshot');
        img.src = result.dataUrl;
        document.getElementById('page-view').style.display = 'flex';
        showLoading(false);
      } catch (err) {
        console.error('截图失败:', err);
      }
    }

    function displayPageInfo(data) {
      const info = document.getElementById('page-info');
      const title = document.getElementById('page-title');
      if (data.title) {
        title.textContent = data.title;
      }
      info.style.display = 'block';
      info.innerHTML = `
        <h2>${data.title || '加载完成'}</h2>
        <dl class="meta">
          <dt>URL</dt><dd>${data.url || ''}</dd>
          <dt>内容大小</dt><dd>${(data.contentLength || 0).toLocaleString()} 字节</dd>
        </dl>
      `;
      // 3秒后隐藏信息
      setTimeout(() => { info.style.display = 'none'; }, 3000);
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }
  </script>
</body>
</html>
