<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Browser Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
      height: 600px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #334155;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .section {
      margin-bottom: 16px;
      flex: 1;
      overflow-y: auto;
    }

    .section-title {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .session-list, .task-list {
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
      max-height: 200px;
      overflow-y: auto;
    }

    .session-item, .task-item {
      padding: 10px 12px;
      border-bottom: 1px solid #334155;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s;
    }

    .session-item:last-child, .task-item:last-child {
      border-bottom: none;
    }

    .session-item:hover {
      background: #334155;
    }

    .session-item.active {
      background: #3b82f6;
    }

    .session-id, .task-id {
      font-family: monospace;
      font-size: 11px;
      color: #94a3b8;
    }

    .session-status, .task-status {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 500;
    }

    .session-status.running, .task-status.running {
      background: #22c55e;
      color: white;
    }

    .session-status.pending, .task-status.pending {
      background: #f59e0b;
      color: white;
    }

    .session-status.success, .task-status.success {
      background: #10b981;
      color: white;
    }

    .session-status.failed, .task-status.failed {
      background: #ef4444;
      color: white;
    }

    .session-time {
      font-size: 11px;
      color: #64748b;
      margin-left: auto;
    }

    .task-type {
      font-size: 11px;
      color: #3b82f6;
      font-weight: 500;
    }

    .ai-input-group {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    .ai-input-group input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }

    .ai-input-group input:focus {
      border-color: #3b82f6;
    }

    .ai-input-group input::placeholder {
      color: #64748b;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Browser Agent</h1>
  </div>

  <div class="section">
    <div class="section-title">浏览器会话</div>
    <div class="button-group">
      <button id="refresh-sessions" class="btn-secondary">刷新</button>
      <button id="create-session" class="btn-primary">新建会话</button>
      <button id="close-session" class="btn-danger">关闭会话</button>
    </div>
    <div id="session-list" class="session-list">
      <div class="empty-state">暂无会话</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">任务记录</div>
    <div id="task-list" class="task-list">
      <div class="empty-state">暂无任务</div>
    </div>
  </div>

  <div class="ai-input-group">
    <input id="ai-command-input" type="text" placeholder="输入AI指令...">
    <button id="send-command" class="btn-primary">发送</button>
  </div>

  <script src="dist/sidepanel.js"></script>
</body>
</html>
