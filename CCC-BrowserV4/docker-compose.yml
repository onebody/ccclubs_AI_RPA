version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: ccc-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_2025
      MYSQL_DATABASE: ccc_browser
      MYSQL_USER: ccc_user
      MYSQL_PASSWORD: ccc_password_2025
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
